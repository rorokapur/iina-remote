<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IINA Remote</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>IINA Remote</h1>
      </div>
      <div class="top-actions">
        <button class="status-btn" id="btn-status-open" type="button" aria-label="Open connection settings">
          <div class="status" id="status-pill">
            <span class="dot" id="connection-dot"></span>
            <span id="connection-status">Disconnected</span>
          </div>
        </button>
      </div>
    </header>

    <section class="panel transport-panel">
      <p class="label">Now Playing</p>
      <h2 id="media-title">No Media Playing</h2>
      <p id="media-artist">Waiting for playback</p>

      <div class="progress-row">
        <span class="time" id="time-current">0:00</span>
        <div class="slider-track">
          <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1">
          <div class="slider-fill" id="progress-fill"></div>
        </div>
        <span class="time" id="time-total">0:00</span>
      </div>

      <div class="controls">
        <button class="btn" id="btn-previous" type="button" aria-label="Previous Track">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>
        <button class="btn primary" id="btn-play-pause" type="button" aria-label="Play or Pause">
          <span id="icon-play-pause">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </span>
        </button>
        <button class="btn" id="btn-next" type="button" aria-label="Next Track">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>
      </div>

      <div class="volume-row">
        <span class="volume-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </span>
        <div class="slider-track">
          <input type="range" id="volume-slider" min="0" max="100" value="100" step="1">
          <div class="slider-fill" id="volume-fill"></div>
        </div>
      </div>

    </section>

    <section class="panel playlist-panel">
      <div class="playlist-head">
        <h3>Playlist</h3>
        <button class="btn icon-btn-small" id="btn-refresh-playlist" type="button" aria-label="Refresh Playlist">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
            <path d="M8 16H3v5"></path>
          </svg>
        </button>
      </div>
      <label class="toggle-row" for="stop-after-current-toggle">
        <input type="checkbox" id="stop-after-current-toggle">
        <span>Hold (next song loads paused)</span>
      </label>
      <ul id="playlist-list" class="playlist-list">
        <li class="playlist-empty">No playlist items available.</li>
      </ul>
    </section>
  </main>

  <div class="modal-backdrop" id="connection-modal">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="connection-modal-title">
      <div class="modal-head">
        <h3 id="connection-modal-title">Connect To IINA</h3>
        <button class="btn icon-btn" id="btn-close-connection" type="button"
          aria-label="Close connection dialog">×</button>
      </div>
      <label class="field" for="ws-url-input">
        <span>WebSocket URL</span>
        <input id="ws-url-input" type="text" placeholder="ws://192.168.1.50:3001">
      </label>
      <div class="connection-actions">
        <button class="btn primary" id="btn-connect" type="button">Connect</button>
        <button class="btn" id="btn-disconnect" type="button">Disconnect</button>
      </div>
      <p class="helper-text">Host this page anywhere, then point it to your machine running IINA.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
